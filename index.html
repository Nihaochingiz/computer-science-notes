<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Computer Science Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>CS Notes</h1>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по заметкам..." autocomplete="off">
                    <div id="searchResults" class="search-results"></div>
                </div>
            </div>
            <nav class="nav-menu">
                <ul id="navList"></ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content" id="content">
            <div class="content-header">
                <button id="menuToggle" class="menu-toggle" aria-label="Открыть меню">☰</button>
                <h2 id="pageTitle"></h2>
            </div>
            <div id="markdownContent" class="markdown-body"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
